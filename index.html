  <!DOCTYPE html>
  <html lang="en">

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>600faws</title>

      <link rel="stylesheet" href="style.css">
  </head>

  <body>

    <!-- Name -->
    <header>
    <h1>600faws</h1>
  </header>

    <!-- Navigation -->
  <nav class="navbar" id="navbar">
  <script>
    const pathParts = window.location.pathname.split('/');
    const siteRootIndex = pathParts.indexOf('600faws'); 
    const basePath = siteRootIndex !== -1 
      ? '/' + pathParts.slice(1, siteRootIndex + 1).join('/') + '/'
      : '/';

    fetch(basePath + 'nav.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar').innerHTML = html;
        document.querySelectorAll('#navbar a[data-link]').forEach(link => {
          link.href = basePath + link.getAttribute('data-link');
        });
      })
      .catch(err => console.error('Error loading navbar:', err));
  </script>
</nav>

<div class="page-layout">
  <div class="column side-column"></div>

  <div class="column main-column">

    <section id="music">
      <h2>Music</h2>
      <script>
        const listEl = document.getElementById('music');

        fetch('post_data.json')
          .then(res => res.json())
          .then(data => {
            data.forEach(post => {
              listEl.insertAdjacentHTML('afterbegin',
                `
                <div class="music-post">
                  <div class="music-post-image">
                    <img src="${post.image}" alt="Music Image">
                  </div>
                  <div class="music-post-text">
                    <h4>${post.title}</h4>
                    <p>${post.description}</p>
                    </div>
                    <div class="music-post-audio">
                      <audio controls>
                        <source src="${post.audio}" type="audio/mpeg">
                        </audio>
                    </div>
                    <p><em>${post.date}</em></p>
                </div>
                `
              );
            });
          });
      </script>
    </section>

    <section id="pictures">
      <h2>Pictures</h2>
    </section>

  </div>

  <div class="column side-column"></div>
</div>



      



  <div id="footer"></div>

  <script>
    const footerPath = basePath + 'footer.html';
    fetch(footerPath)
      .then(res => res.text())
      .then(html => {
        document.getElementById('footer').innerHTML = html;
      })
      .catch(err => console.error('Error loading footer:', err));
  </script>
  </body>
  </html>
